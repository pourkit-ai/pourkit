name: E2E Target Green

on:
  push:
    branches:
      - "pourkit-e2e-target/**"

permissions:
  contents: read

jobs:
  target-green:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hold check open and evaluate commit message
        env:
          POURKIT_TARGET_GREEN_HOLD_MS: "25000"
        run: npx tsx pourkit/e2e/target-green-check.ts
